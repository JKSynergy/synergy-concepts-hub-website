name: Deploy Portal to Vercel

on:
  push:
    branches: [main, master]
    paths:
      - "portal/**"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

concurrency:
  group: vercel-portal
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy portal
    defaults:
      run:
        working-directory: portal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_PORTAL_URL: ${{ secrets.NEXT_PUBLIC_PORTAL_URL }}
          ADMIN_NOTIFY_EMAIL: ${{ secrets.ADMIN_NOTIFY_EMAIL }}
          MARKETING_SITE_ORIGIN: ${{ secrets.MARKETING_SITE_ORIGIN }}

      - name: Deploy to Vercel
        uses: vercel/actions-deploy@v1
        if: ${{ false }} # Set to true after linking Vercel project (see README)
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: portal
